<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan AI | Global Link Security</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-shield-halved"></i>
                <h1>SafeScan <span>AI</span></h1>
            </div>
            <p>The world's fastest URL safety & malware scanner.</p>
        </header>

        <main>
            <div class="search-box">
                <i class="fas fa-link"></i>
                <input type="text" id="urlInput" placeholder="Paste link here..." required>
                <button id="scanBtn" onclick="checkLink()">Scan Now</button>
            </div>

            <div id="resultArea" class="result-card" style="display: none;">
                <div id="status"></div>
            </div>
            
            <div class="ad-container">
                <span class="ad-label">SPONSORED ADVERTISEMENT</span>
                <div class="ad-placeholder">
                    </div>
            </div>
        </main>

        <footer>
            <div class="footer-links">
                <span>Privacy Policy</span> | <span>Terms</span> | <span>API</span>
            </div>
            <p>&copy; 2026 SafeScan AI Global.</p>
        </footer>
    </div>

    <script>
        function checkLink() {
            // 1. الحصول على العناصر
            let urlInput = document.getElementById('urlInput');
            let resultArea = document.getElementById('resultArea');
            let status = document.getElementById('status');
            let url = urlInput.value.toLowerCase().trim();

            // 2. التحقق من صحة المدخلات
            if(url === "" || !url.includes('.')) {
                alert("Please enter a valid URL!");
                return;
            }

            // 3. إظهار منطقة النتائج والبدء في الأنيميشن
            resultArea.style.display = "block";
            status.innerHTML = `
                <div class="loading-state">
                    <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: #38bdf8;"></i>
                    <h3 style="margin-top:15px;">Analyzing Security...</h3>
                    <p>Scanning global databases for threats.</p>
                </div>
            `;
            
            // 4. محاكاة الفحص (تغيير النتيجة بناءً على الرابط)
            setTimeout(() => {
                const suspiciousWords = ['bit.ly', 'free', 'win', 'gift', 'login', 'hack'];
                let isSuspicious = suspiciousWords.some(word => url.includes(word));

                if (isSuspicious) {
                    status.innerHTML = `
                        <div class="success-state" style="color: #ff4757;">
                            <i class="fas fa-exclamation-triangle" style="font-size: 3rem;"></i>
                            <h3>⚠️ Potential Threat</h3>
                            <p>This URL <strong>${url}</strong> shows suspicious patterns.</p>
                            <div class="stats" style="border-top: 1px solid #451a1a; margin-top:15px; padding-top:10px;">
                                <span>Risk: High</span> | <span>Status: Flagged</span>
                            </div>
                        </div>
                    `;
                } else {
                    status.innerHTML = `
                        <div class="success-state" style="color: #2ecc71;">
                            <i class="fas fa-check-circle" style="font-size: 3rem;"></i>
                            <h3>✅ URL is Secure</h3>
                            <p>No threats detected for: <strong>${url}</strong></p>
                            <div class="stats" style="border-top: 1px solid #1a4526; margin-top:15px; padding-top:10px;">
                                <span>Risk: 0%</span> | <span>Status: Clean</span>
                            </div>
                        </div>
                    `;
                }
            }, 2000);
        }
    </script>
</body>
</html>
